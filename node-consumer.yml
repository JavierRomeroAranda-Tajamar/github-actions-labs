name: Node Consumer Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  call-reusable-node-18:
    uses: ./.github/workflows/reusable-node-pipeline.yml
    with:
      node-version: "18"
      artifact-name: "node-build-node-18"
      retention-days: 5

  call-reusable-node-20:
    uses: ./.github/workflows/reusable-node-pipeline.yml
    with:
      node-version: "20"
      artifact-name: "node-build-node-20"
      retention-days: 5

  summary:
    runs-on: ubuntu-latest
    needs:
      - call-reusable-node-18
      - call-reusable-node-20

    steps:
      - name: Show reusable workflow outputs
        run: |
          echo "Node 18 usado: ${{ needs.call-reusable-node-18.outputs.node-version-used }}"
          echo "Estado Node 18: ${{ needs.call-reusable-node-18.outputs.build-status }}"
          echo "Node 20 usado: ${{ needs.call-reusable-node-20.outputs.node-version-used }}"
          echo "Estado Node 20: ${{ needs.call-reusable-node-20.outputs.build-status }}"

      - name: Additional consumer logic
        run: |
          echo "Este step pertenece solo al workflow consumidor"
          echo "Aquí podríamos hacer despliegue, notificaciones o validaciones extra"
