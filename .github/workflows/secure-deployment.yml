name: Secure Deployment Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: secure-build
          path: dist/
          retention-days: 5

      - name: Build summary
        if: always()
        run: |
          echo "## Build and Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Aplicación | ${{ vars.APP_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rama | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Resultado | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-test

    if: github.ref == 'refs/heads/main' && needs.build-and-test.result == 'success'

    environment:
      name: staging

    permissions:
      contents: read

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: secure-build
          path: dist/

      - name: Validate secrets without printing them
        env:
          API_KEY: ${{ secrets.API_KEY }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          if [ -z "$API_KEY" ]; then
            echo "API_KEY is missing"
            exit 1
          fi

          if [ -z "$DEPLOY_TOKEN" ]; then
            echo "DEPLOY_TOKEN is missing"
            exit 1
          fi

          echo "Secrets are configured correctly"

      - name: Deploy to staging
        run: |
          echo "Deploying ${{ vars.APP_NAME }} to staging"
          echo "Using artifact from dist/"
          echo "Deployment to staging completed"

      - name: Staging summary
        if: always()
        run: |
          echo "## Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Aplicación | ${{ vars.APP_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Entorno | staging |" >> $GITHUB_STEP_SUMMARY
          echo "| Resultado | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging

    if: github.ref == 'refs/heads/main' && needs.deploy-staging.result == 'success'

    environment:
      name: production

    permissions:
      contents: read

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: secure-build
          path: dist/

      - name: Validate production secrets without printing them
        env:
          API_KEY: ${{ secrets.API_KEY }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          if [ -z "$API_KEY" ]; then
            echo "API_KEY is missing"
            exit 1
          fi

          if [ -z "$DEPLOY_TOKEN" ]; then
            echo "DEPLOY_TOKEN is missing"
            exit 1
          fi

          echo "Production secrets are configured correctly"

      - name: Deploy to production
        run: |
          echo "Deploying ${{ vars.APP_NAME }} to production"
          echo "Using artifact from dist/"
          echo "Deployment to production completed"

      - name: Production summary
        if: always()
        run: |
          echo "## Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Aplicación | ${{ vars.APP_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Entorno | production |" >> $GITHUB_STEP_SUMMARY
          echo "| Resultado | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
