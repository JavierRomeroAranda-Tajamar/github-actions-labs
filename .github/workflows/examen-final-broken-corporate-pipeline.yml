name: examen final - Fixed Corporate Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/lab8-broken-corporate-pipeline.yml"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect-components:
    name: Detect components
    runs-on: ubuntu-latest

    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed components
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

      - name: Show detected components
        run: |
          echo "Frontend changed: ${{ steps.filter.outputs.frontend }}"
          echo "Backend changed: ${{ steps.filter.outputs.backend }}"

  build:
    name: Build ${{ matrix.component }}
    runs-on: ubuntu-latest
    needs: detect-components

    if: |
      needs.detect-components.outputs.frontend == 'true' ||
      needs.detect-components.outputs.backend == 'true' ||
      github.event_name == 'workflow_dispatch'

    strategy:
      fail-fast: false
      matrix:
        include:
          - component: frontend
            path: frontend
          - component: backend
            path: backend

    steps:
      - name: Checkout repository
        if: |
          github.event_name == 'workflow_dispatch' ||
          (matrix.component == 'frontend' && needs.detect-components.outputs.frontend == 'true') ||
          (matrix.component == 'backend' && needs.detect-components.outputs.backend == 'true')
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: |
          github.event_name == 'workflow_dispatch' ||
          (matrix.component == 'frontend' && needs.detect-components.outputs.frontend == 'true') ||
          (matrix.component == 'backend' && needs.detect-components.outputs.backend == 'true')
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache dependencies
        if: |
          github.event_name == 'workflow_dispatch' ||
          (matrix.component == 'frontend' && needs.detect-components.outputs.frontend == 'true') ||
          (matrix.component == 'backend' && needs.detect-components.outputs.backend == 'true')
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: node-${{ runner.os }}-${{ matrix.component }}-${{ hashFiles(format('{0}/package.json', matrix.path)) }}
          restore-keys: |
            node-${{ runner.os }}-${{ matrix.component }}-

      - name: Install dependencies
        if: |
          github.event_name == 'workflow_dispatch' ||
          (matrix.component == 'frontend' && needs.detect-components.outputs.frontend == 'true') ||
          (matrix.component == 'backend' && needs.detect-components.outputs.backend == 'true')
        working-directory: ${{ matrix.path }}
        run: npm install

      - name: Run tests
        if: |
          github.event_name == 'workflow_dispatch' ||
          (matrix.component == 'frontend' && needs.detect-components.outputs.frontend == 'true') ||
          (matrix.component == 'backend' && needs.detect-components.outputs.backend == 'true')
        working-directory: ${{ matrix.path }}
        run: npm test

      - name: Build project
        if: |
          github.event_name == 'workflow_dispatch' ||
          (matrix.component == 'frontend' && needs.detect-components.outputs.frontend == 'true') ||
          (matrix.component == 'backend' && needs.detect-components.outputs.backend == 'true')
        working-directory: ${{ matrix.path }}
        run: npm run build

      - name: Upload artifact
        if: |
          github.event_name == 'workflow_dispatch' ||
          (matrix.component == 'frontend' && needs.detect-components.outputs.frontend == 'true') ||
          (matrix.component == 'backend' && needs.detect-components.outputs.backend == 'true')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.component }}-artifact
          path: ${{ matrix.path }}/dist/
          retention-days: 5

  deploy:
    name: Deploy application
    runs-on: ubuntu-latest
    needs:
      - detect-components
      - build

    if: |
      always() &&
      needs.build.result == 'success' &&
      github.ref == 'refs/heads/main'

    steps:
      - name: Download frontend artifact
        if: |
          needs.detect-components.outputs.frontend == 'true' ||
          github.event_name == 'workflow_dispatch'
        uses: actions/download-artifact@v4
        with:
          name: frontend-artifact
          path: downloaded-artifacts/frontend/

      - name: Download backend artifact
        if: |
          needs.detect-components.outputs.backend == 'true' ||
          github.event_name == 'workflow_dispatch'
        uses: actions/download-artifact@v4
        with:
          name: backend-artifact
          path: downloaded-artifacts/backend/

      - name: Simulate deployment
        run: |
          echo "Deploying available artifacts"
          find downloaded-artifacts -type f || true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run fake security scan
        run: |
          echo "Running security scan"
          echo "No secrets are printed"
          echo "Security scan completed"

  final-report:
    name: Final Report
    runs-on: ubuntu-latest
    needs:
      - detect-components
      - build
      - deploy
      - security-scan

    if: always()

    steps:
      - name: Generate technical report
        run: |
          echo "## LAB 8 - Troubleshooting avanzado multi-workflow" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Resultados de jobs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Resultado |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Detect components | ${{ needs.detect-components.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Componentes detectados" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Componente | Cambios |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.detect-components.outputs.frontend }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.detect-components.outputs.backend }} |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Mejoras aplicadas" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Permisos reducidos al mínimo necesario." >> $GITHUB_STEP_SUMMARY
          echo "- Actions versionadas con tags estables." >> $GITHUB_STEP_SUMMARY
          echo "- Eliminada impresión accidental de secrets." >> $GITHUB_STEP_SUMMARY
          echo "- Matrix corregida eliminando componentes inexistentes." >> $GITHUB_STEP_SUMMARY
          echo "- Cache optimizada por componente." >> $GITHUB_STEP_SUMMARY
          echo "- Condición de rama corregida usando refs/heads/main." >> $GITHUB_STEP_SUMMARY
          echo "- Artifacts descargados con nombres correctos." >> $GITHUB_STEP_SUMMARY
