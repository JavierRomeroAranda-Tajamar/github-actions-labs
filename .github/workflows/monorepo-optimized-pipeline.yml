name: Monorepo Optimized Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "backend/**"
      - "infra/**"
      - "docs/**"
      - ".github/workflows/monorepo-optimized-pipeline.yml"
      - ".github/workflows/reusable-node-component.yml"

  workflow_dispatch:
    inputs:
      run-frontend:
        description: "Ejecutar frontend manualmente"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      run-backend:
        description: "Ejecutar backend manualmente"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      run-infra:
        description: "Ejecutar infra manualmente"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  pull-requests: read

jobs:
  detect-changes:
    name: Detect changed components
    runs-on: ubuntu-latest

    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      infra: ${{ steps.filter.outputs.infra }}
      docs: ${{ steps.filter.outputs.docs }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect path changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            infra:
              - 'infra/**'
            docs:
              - 'docs/**'

      - name: Show detected changes
        run: |
          echo "Frontend changed: ${{ steps.filter.outputs.frontend }}"
          echo "Backend changed: ${{ steps.filter.outputs.backend }}"
          echo "Infra changed: ${{ steps.filter.outputs.infra }}"
          echo "Docs changed: ${{ steps.filter.outputs.docs }}"

  frontend-pipeline:
    name: Frontend Pipeline
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.frontend == 'true' ||
      github.event.inputs.run-frontend == 'true'
    uses: ./.github/workflows/reusable-node-component.yml
    with:
      component: frontend
      component-path: frontend

  backend-pipeline:
    name: Backend Pipeline
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.backend == 'true' ||
      github.event.inputs.run-backend == 'true'
    uses: ./.github/workflows/reusable-node-component.yml
    with:
      component: backend
      component-path: backend

  infra-pipeline:
    name: Infra Pipeline
    needs: detect-changes
    runs-on: ubuntu-latest

    if: |
      needs.detect-changes.outputs.infra == 'true' ||
      github.event.inputs.run-infra == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate infra files
        run: |
          echo "Validando archivos de infraestructura"
          test -f infra/main.tf
          echo "infra/main.tf existe correctamente"

      - name: Simulate terraform validation
        run: |
          echo "Simulando terraform fmt"
          echo "Simulando terraform validate"
          echo "Infraestructura validada correctamente"

      - name: Generate infra artifact
        run: |
          mkdir -p infra-report
          echo "Infra pipeline ejecutado correctamente" > infra-report/infra-result.txt

      - name: Upload infra report
        uses: actions/upload-artifact@v4
        with:
          name: infra-report
          path: infra-report/
          retention-days: 5

  docs-only:
    name: Documentation Only Check
    needs: detect-changes
    runs-on: ubuntu-latest

    if: |
      needs.detect-changes.outputs.docs == 'true' &&
      needs.detect-changes.outputs.frontend != 'true' &&
      needs.detect-changes.outputs.backend != 'true' &&
      needs.detect-changes.outputs.infra != 'true'

    steps:
      - name: Documentation change detected
        run: |
          echo "Solo se han detectado cambios en documentación."
          echo "No se ejecutan pipelines técnicos innecesarios."

  monorepo-summary:
    name: Monorepo Summary
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - frontend-pipeline
      - backend-pipeline
      - infra-pipeline
      - docs-only

    if: always()

    steps:
      - name: Generate monorepo summary
        run: |
          echo "## LAB 7 - Monorepo Optimized Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Componentes afectados" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Componente | Cambios detectados |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.detect-changes.outputs.frontend }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.detect-changes.outputs.backend }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Infra | ${{ needs.detect-changes.outputs.infra }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docs | ${{ needs.detect-changes.outputs.docs }} |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pipelines ejecutados u omitidos" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Pipeline | Resultado |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.frontend-pipeline.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.backend-pipeline.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Infra | ${{ needs.infra-pipeline.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docs only | ${{ needs.docs-only.result }} |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Optimización aplicada" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Se usa paths-filter para detectar cambios por carpeta." >> $GITHUB_STEP_SUMMARY
          echo "- Frontend solo se ejecuta si cambia frontend/." >> $GITHUB_STEP_SUMMARY
          echo "- Backend solo se ejecuta si cambia backend/." >> $GITHUB_STEP_SUMMARY
          echo "- Infra solo se ejecuta si cambia infra/." >> $GITHUB_STEP_SUMMARY
          echo "- Cambios exclusivos en docs/ no lanzan pipelines técnicos." >> $GITHUB_STEP_SUMMARY
          echo "- La lógica Node se reutiliza mediante workflow_call." >> $GITHUB_STEP_SUMMARY
