name: LAB 8 - Broken Corporate Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions: write-all

jobs:
  build:
    name: Build ${{ matrix.component }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        include:
          - component: frontend
            path: frontend
          - component: backend
            path: backend
          - component: api
            path: api

    outputs:
      artifact-name: ${{ steps.meta.outputs.artifact }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Setup Node.js
        uses: actions/setup-node@main
        with:
          node-version: "20"

      - name: Print secret accidentally
        run: |
          echo "API KEY is ${{ secrets.API_KEY }}"

      - name: Cache dependencies
        uses: actions/cache@main
        with:
          path: ~/.npm
          key: node-cache-${{ hashFiles('package.json') }}

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: npm install

      - name: Run tests
        working-directory: ${{ matrix.path }}
        run: npm test

      - name: Build project
        working-directory: ${{ matrix.path }}
        run: npm run build

      - name: Set metadata
        id: metadata
        run: |
          echo "artifact=${{ matrix.component }}-artifact" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@main
        with:
          name: ${{ matrix.component }}-artifact
          path: ${{ matrix.path }}/dist/

  deploy:
    name: Deploy application
    runs-on: ubuntu-latest
    needs: build

    if: github.ref == 'main'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@main
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: downloaded-artifact/

      - name: Deploy
        run: |
          echo "Deploying artifact"
          ls -la downloaded-artifact/

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Run fake security scan
        run: |
          echo "Running security scan"
          echo "Token: ${{ github.token }}"

  final-report:
    name: Final Report
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy
      - security-scan

    steps:
      - name: Generate report
        run: |
          echo "Build result: ${{ needs.build.result }}"
          echo "Deploy result: ${{ needs.deploy.result }}"
          echo "Security result: ${{ needs.security-scan.result }}"
