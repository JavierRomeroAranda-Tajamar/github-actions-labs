name: Self-hosted Hybrid Troubleshooting

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  hosted-validation:
    name: Hosted Validation
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js on hosted runner
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Upload hosted build artifact
        uses: actions/upload-artifact@v4
        with:
          name: hosted-build-output
          path: dist/
          retention-days: 5

  self-hosted-diagnostics:
    name: Self-hosted Runner Diagnostics
    runs-on: [self-hosted, lab5, node]
    needs: hosted-validation

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show runner context
        shell: powershell -ExecutionPolicy Bypass -Command
        run: |
          Write-Host "Runner name: $env:RUNNER_NAME"
          Write-Host "Runner OS: $env:RUNNER_OS"
          Write-Host "Repository: $env:GITHUB_REPOSITORY"
          Write-Host "Branch: $env:GITHUB_REF_NAME"
          Write-Host "Workspace: $env:GITHUB_WORKSPACE"

      - name: Validate expected project files
        shell: powershell -ExecutionPolicy Bypass -Command
        run: |
          if (!(Test-Path "package.json")) {
            Write-Host "ERROR: package.json not found"
            exit 1
          }

          if (!(Test-Path "test.js")) {
            Write-Host "ERROR: test.js not found"
            exit 1
          }

          Write-Host "Required files found"

      - name: Setup Node.js on self-hosted runner
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies on self-hosted runner
        shell: powershell -ExecutionPolicy Bypass -Command
        run: npm install

      - name: Run tests on self-hosted runner
        shell: powershell -ExecutionPolicy Bypass -Command
        run: npm test

      - name: Generate diagnostic logs
        shell: powershell -ExecutionPolicy Bypass -Command
        run: |
          New-Item -ItemType Directory -Force -Path logs
          "Runner name: $env:RUNNER_NAME" | Out-File logs/self-hosted-runner.log
          "Runner OS: $env:RUNNER_OS" | Out-File logs/self-hosted-runner.log -Append
          "Repository: $env:GITHUB_REPOSITORY" | Out-File logs/self-hosted-runner.log -Append
          "Branch: $env:GITHUB_REF_NAME" | Out-File logs/self-hosted-runner.log -Append
          "Workspace: $env:GITHUB_WORKSPACE" | Out-File logs/self-hosted-runner.log -Append
          "Diagnostics completed successfully" | Out-File logs/self-hosted-runner.log -Append

      - name: Upload self-hosted diagnostic logs
        uses: actions/upload-artifact@v4
        with:
          name: self-hosted-diagnostic-logs
          path: logs/
          retention-days: 5

  final-summary:
    name: Final Summary
    runs-on: ubuntu-latest
    needs:
      - hosted-validation
      - self-hosted-diagnostics

    permissions:
      contents: read

    steps:
      - name: Generate lab summary
        run: |
          echo "## LAB 5 - Self-hosted runners y troubleshooting" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Componente | Resultado |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Hosted runner | ${{ needs.hosted-validation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Self-hosted runner | ${{ needs.self-hosted-diagnostics.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Diferenciación de runners | Hosted + Self-hosted |" >> $GITHUB_STEP_SUMMARY
          echo "| Labels usadas | self-hosted, lab5, node |" >> $GITHUB_STEP_SUMMARY
