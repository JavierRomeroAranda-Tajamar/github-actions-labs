name: Reusable Node Component Pipeline

on:
  workflow_call:
    inputs:
      component:
        description: "Nombre del componente a ejecutar"
        required: true
        type: string

      component-path:
        description: "Ruta del componente dentro del monorepo"
        required: true
        type: string

    outputs:
      component-name:
        description: "Componente procesado"
        value: ${{ jobs.node-component.outputs.component-name }}

      pipeline-status:
        description: "Estado del pipeline"
        value: ${{ jobs.node-component.outputs.pipeline-status }}

jobs:
  node-component:
    runs-on: ubuntu-latest

    outputs:
      component-name: ${{ steps.component-info.outputs.component-name }}
      pipeline-status: ${{ steps.component-info.outputs.pipeline-status }}

    defaults:
      run:
        working-directory: ${{ inputs.component-path }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: node-${{ runner.os }}-${{ inputs.component }}-${{ hashFiles(format('{0}/package.json', inputs.component-path)) }}
          restore-keys: |
            node-${{ runner.os }}-${{ inputs.component }}-

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build component
        run: npm run build

      - name: Set outputs
        id: component-info
        run: |
          echo "component-name=${{ inputs.component }}" >> $GITHUB_OUTPUT
          echo "pipeline-status=success" >> $GITHUB_OUTPUT

      - name: Upload component artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.component }}-build
          path: ${{ inputs.component-path }}/dist/
          retention-days: 5
